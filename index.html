<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peace of Mind Panel Premium</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f5f3ee;--card:#ffffff;--text-primary:#2c2c2c;--text-secondary:#6b6b6b;--text-muted:#9a9a9a;
--calm:#7bae7f;--calm-bg:#edf5ee;--calm-text:#3d6b40;
--concern:#d4a052;--concern-bg:#fdf3e4;--concern-text:#8b6520;
--attention:#d46a6a;--attention-bg:#faeaea;--attention-text:#8b3030;
--sleep:#7b8fcf;--sleep-bg:#eef1fb;--sleep-text:#4b5d95;
--border:#e8e5df;--shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
--radius-sm:8px;--radius-md:12px;--radius-lg:20px;
--dot-motion:#7bae7f;--dot-medication:#5b9bd5;--dot-alert:#d46a6a;--dot-door:#a8a8a8;--dot-bed:#7b8fcf}
html{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.5;color:var(--text-primary);background:var(--bg);-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:var(--bg);padding-bottom:32px}
.container{max-width:560px;margin:0 auto;padding:0 16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{width:28px;height:28px}
.header-title{font-size:16px;font-weight:600}
.header-date{font-size:13px;color:var(--text-secondary)}
.refresh-btn,.date-nav-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary)}
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0 16px}
.date-nav-btn{border:1px solid var(--border);background:var(--card)}
.date-nav-label{font-size:15px;font-weight:500;min-width:140px;text-align:center}
.date-nav-sublabel{font-size:12px;color:var(--text-muted)}
.status-banner{border-radius:var(--radius-lg);padding:18px 20px;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.status-banner.calm{background:var(--calm-bg)}
.status-banner.slight-concern{background:var(--concern-bg)}
.status-banner.needs-attention{background:var(--attention-bg)}
.status-banner.no-data{background:#f0f0f0}
.status-emoji{font-size:28px;line-height:1}
.status-label{font-size:17px;font-weight:600}
.status-sublabel{font-size:13px;margin-top:2px;color:var(--text-secondary)}
.card{background:var(--card);border-radius:var(--radius-md);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border-left:3px solid transparent}
.card.has-alert{border-left-color:var(--attention)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-header-left{display:flex;align-items:center;gap:10px}
.card-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.card-icon.meds{background:#ede7f6;color:#7e57c2}
.card-icon.activity{background:#e8f5e9;color:#66bb6a}
.card-icon.safety{background:#e3f2fd;color:#42a5f5}
.card-icon.sleep{background:var(--sleep-bg);color:var(--sleep-text)}
.card-title{font-size:15px;font-weight:600}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.badge-ok,.badge-normal{background:var(--calm-bg);color:var(--calm-text)}
.badge-pending,.badge-warning{background:var(--concern-bg);color:var(--concern-text)}
.badge-alert,.badge-attention,.badge-low,.badge-unusual{background:var(--attention-bg);color:var(--attention-text)}
.badge-sleep{background:var(--sleep-bg);color:var(--sleep-text)}
.card-summary{font-size:14px;color:var(--text-secondary);line-height:1.5;margin-bottom:12px}
.card-stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);background:#f8f7f4;padding:6px 10px;border-radius:var(--radius-sm)}
.stat-value{font-weight:600;color:var(--text-primary)}
.meds-indicators{display:flex;gap:12px;margin-bottom:12px}
.med-slot{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)}
.med-check{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.med-check.taken{background:var(--calm);color:white}
.med-check.pending{background:var(--concern-bg);border:2px solid var(--concern);color:var(--concern)}
.med-check.missed{background:var(--attention-bg);border:2px solid var(--attention);color:var(--attention)}
.trend-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mini-panel{padding:12px;border-radius:12px;background:#f8f7f4}
.mini-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.mini-value{font-size:15px;font-weight:600}
.mini-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}
.sleep-vitals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.vital-box{background:#f0f4ff;border-radius:var(--radius-sm);padding:10px 12px;text-align:center;transition:background .3s}
.vital-box.vok{background:var(--calm-bg)}.vital-box.vwarn{background:var(--concern-bg)}.vital-box.valert{background:var(--attention-bg)}
.vital-label{font-size:11px;color:var(--text-muted);margin-bottom:2px}
.vital-value{font-size:22px;font-weight:700;color:var(--text-primary)}
.vital-unit{font-size:11px;color:var(--text-secondary)}
.vital-badge{font-size:11px;font-weight:600;margin-top:3px;padding:1px 6px;border-radius:20px;display:inline-block}
.vital-badge.vok{background:var(--calm-bg);color:var(--calm-text)}.vital-badge.vwarn{background:var(--concern-bg);color:var(--concern-text)}.vital-badge.valert{background:var(--attention-bg);color:var(--attention-text)}
.sleep-live{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--calm-text);margin-bottom:8px;font-weight:500}
.sleep-live-dot{width:8px;height:8px;border-radius:50%;background:var(--calm);flex-shrink:0;animation:pulse 2s infinite}
.timeline-section{margin-top:8px}
.timeline-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.timeline-title{font-size:15px;font-weight:600}
.timeline-toggle{font-size:13px;font-weight:500;color:var(--calm-text);background:var(--calm-bg);border:none;padding:6px 14px;border-radius:100px;cursor:pointer;min-height:44px}
.timeline-list{list-style:none}
.timeline-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0}
.timeline-item:not(:last-child){border-bottom:1px solid #f0ede8}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:6px;flex-shrink:0}
.timeline-dot.motion{background:var(--dot-motion)}.timeline-dot.medication{background:var(--dot-medication)}.timeline-dot.alert{background:var(--dot-alert)}.timeline-dot.door,.timeline-dot.dooropen,.timeline-dot.doorclose{background:var(--dot-door)}.timeline-dot.bed{background:var(--dot-bed)}
.timeline-time{font-size:13px;font-weight:600;color:var(--text-primary);min-width:44px;padding-top:1px}
.timeline-event{font-size:14px;color:var(--text-secondary);line-height:1.4;flex:1}
.timeline-empty{text-align:center;padding:24px 16px;color:var(--text-muted);font-size:14px}
.timeline-item.alert-item{background:var(--attention-bg);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:4px;border-bottom:none}
/* ERROR BOX — widoczny zawsze gdy API nie odpowiada */
.error-box{background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius-md);padding:16px;margin-bottom:16px}
.error-box-title{font-size:14px;font-weight:600;color:#856404;margin-bottom:6px}
.error-box-msg{font-size:12px;color:#856404;word-break:break-all;margin-bottom:10px}
.error-box-url{font-size:11px;color:#856404;font-family:monospace;background:#fff8e1;padding:4px 6px;border-radius:4px;margin-bottom:10px;word-break:break-all}
.error-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;background:var(--calm);color:white;font-size:13px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer}
.hidden{display:none!important}
.skeleton{background:linear-gradient(90deg,#e8e5df 25%,#f0ede8 50%,#e8e5df 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-sm)}
.skeleton-banner{height:72px;border-radius:var(--radius-lg);margin-bottom:16px}
.skeleton-card{height:120px;border-radius:var(--radius-md);margin-bottom:12px}
.debug-panel{background:#1e1e1e;color:#0f0;font-family:monospace;font-size:11px;padding:12px;border-radius:var(--radius-sm);margin-top:16px;white-space:pre-wrap;display:none}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-left">
      <svg class="header-logo" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="#7BAE7F" stroke-width="1.5" fill="#EDF5EE"/>
        <path d="M14 7C11 7 8.5 9.2 8.5 12.5c0 4.5 5.5 9 5.5 9s5.5-4.5 5.5-9C19.5 9.2 17 7 14 7z" fill="#7BAE7F" opacity="0.7"/>
      </svg>
      <div class="header-title">Peace of Mind Panel Premium</div>
    </div>
    <div class="header-date" id="headerDate"></div>
    <button class="refresh-btn" id="refreshBtn" aria-label="Refresh">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
  </header>

  <nav class="date-nav">
    <button class="date-nav-btn" id="prevDay">&#8592;</button>
    <div>
      <div class="date-nav-label" id="dateLabel"></div>
      <div class="date-nav-sublabel" id="dateSublabel"></div>
    </div>
    <button class="date-nav-btn" id="nextDay">&#8594;</button>
  </nav>

  <main>
    <!-- Skeleton loader -->
    <div id="skeleton">
      <div class="skeleton skeleton-banner"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <!-- Error box — pokazuje sie gdy API nie odpowie w 10s -->
    <div id="errorBox" class="error-box hidden">
      <div class="error-box-title">&#9888; Could not load data</div>
      <div class="error-box-msg" id="errorMsg"></div>
      <div class="error-box-url" id="errorUrl"></div>
      <button class="error-btn" id="retryBtn">&#8635; Retry</button>
    </div>

    <!-- Data view -->
    <div id="dataView" class="hidden">
      <div id="statusBanner" class="status-banner"></div>

      <div id="medsCard" class="card">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-icon meds">&#128138;</div>
            <div class="card-title">Medications</div>
          </div>
          <span id="medsBadge" class="badge"></span>
        </div>
        <div id="medsIndicators" class="meds-indicators"></div>
        <div id="medsSummary" class="card-summary"></div>
      </div>

      <div id="activityCard" class="card">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-icon activity">&#128694;</div>
            <div class="card-title">Activity</div>
          </div>
          <span id="activityBadge" class="badge"></span>
        </div>
        <div id="activitySummary" class="card-summary"></div>
        <div id="activityStats" class="card-stats"></div>
      </div>

      <div id="sleepCard" class="card">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-icon sleep">&#128564;</div>
            <div class="card-title">Sleep</div>
          </div>
          <span id="sleepBadge" class="badge badge-sleep">Sleep</span>
        </div>
        <div id="sleepLive" class="sleep-live hidden">
          <div class="sleep-live-dot"></div><span>Live monitoring active</span>
        </div>
        <div id="sleepVitals" class="sleep-vitals">
          <div id="vboxBreathing" class="vital-box"><div class="vital-label">Breathing</div><div class="vital-value" id="vBreathing">--</div><div class="vital-unit">breaths/min</div><div id="vBreathingBadge" class="vital-badge">--</div></div>
          <div id="vboxHeart" class="vital-box"><div class="vital-label">Heart Rate</div><div class="vital-value" id="vHeart">--</div><div class="vital-unit">bpm</div><div id="vHeartBadge" class="vital-badge">--</div></div>
          <div id="vboxPresence" class="vital-box"><div class="vital-label">In Bed</div><div class="vital-value" id="vPresence">--</div><div class="vital-unit">&nbsp;</div><div id="vPresenceBadge" class="vital-badge">--</div></div>
          <div id="vboxLight" class="vital-box"><div class="vital-label">Light Level</div><div class="vital-value" id="vLight">--</div><div class="vital-unit">lux</div><div id="vLightBadge" class="vital-badge">--</div></div>
        </div>
        <div id="sleepSummary" class="card-summary"></div>
        <div id="sleepStats" class="card-stats"></div>
      </div>

      <div id="safetyCard" class="card">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-icon safety">&#128737;</div>
            <div class="card-title">Safety</div>
          </div>
          <span id="safetyBadge" class="badge"></span>
        </div>
        <div id="safetySummary" class="card-summary"></div>
        <div id="safetyStats" class="card-stats"></div>
      </div>

      <div class="trend-row">
        <div class="mini-panel"><div class="mini-label">Day trend</div><div class="mini-value" id="trendValue"></div><div class="mini-sub" id="trendSub"></div></div>
        <div class="mini-panel"><div class="mini-label">Baseline</div><div class="mini-value" id="baselineValue"></div><div class="mini-sub" id="baselineSub"></div></div>
      </div>

      <div class="timeline-section">
        <div class="timeline-header">
          <div class="timeline-title" id="timelineTitle">Today&#x27;s Timeline</div>
          <button class="timeline-toggle hidden" id="timelineToggle">Show all</button>
        </div>
        <ul class="timeline-list" id="timelineList"></ul>
      </div>

      <div class="debug-panel" id="debugPanel"></div>
    </div>
  </main>
</div>

<script>
(function(){
try{if(window.Telegram)Telegram.WebApp.ready(),Telegram.WebApp.expand();}catch(e){}

// ═══ CONFIG ════════════════════════════════════════════════════
var API_BASE = 'https://n8n.srv1161536.hstgr.cloud/webhook/daily-summary';
var HA_BASE  = 'https://ha.seniorslearnai.co.uk';
var HA_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MjJiZTZiYmE3MjA0ZWZiYmY2OGI0MTYwYjViYWFiNyIsImlhdCI6MTc3Nzc0MTY5NiwiZXhwIjoyMDkzMTAxNjk2fQ.uEBaIEK4w2fFE3MR6fXiHDBgjdrRcbnIALcl6XUIMro';
var FETCH_TIMEOUT_MS = 10000; // 10 sekund timeout

var SLEEP_ENT = {
  breathing : 'sensor.bedroom_breathing_sensor_czestotliwosc_oddechu',
  heartRate : 'sensor.bedroom_breathing_sensor_tetno',
  presence  : 'binary_sensor.bedroom_breathing_sensor_obecnosc_osoby',
  light     : 'sensor.bedroom_breathing_sensor_natezenie_swiatla'
};
// ══════════════════════════════════════════════════════════════

var currentDate=new Date(), timelineExpanded=false, currentData=null;
var refreshTimer=null, sleepTimer=null;

function $(i){return document.getElementById(i);}
function esc(s){var d=document.createElement('div');d.textContent=String(s==null?'':s);return d.innerHTML;}
function fDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function fDisp(d){return d.toLocaleDateString('en-GB',{month:'long',day:'numeric',year:'numeric'});}
function fShort(d){return d.toLocaleDateString('en-GB',{weekday:'long'});}
function isToday(d){var n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
function isYest(d){var y=new Date();y.setDate(y.getDate()-1);return d.getFullYear()===y.getFullYear()&&d.getMonth()===y.getMonth()&&d.getDate()===y.getDate();}
function fTime(v){if(!v)return'';try{return new Date(v).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function fHours(h){if(h==null||isNaN(h))return'';return Number(h).toFixed(1)+'h';}
function safe(obj){return obj||{};}
function safeArr(a){return Array.isArray(a)?a:[];}

// fetch with timeout
function fetchWithTimeout(url, opts, ms){
  var controller=new AbortController();
  var timer=setTimeout(function(){controller.abort();},ms||FETCH_TIMEOUT_MS);
  return fetch(url, Object.assign({signal:controller.signal},opts||{}))
    .finally(function(){clearTimeout(timer);});
}

var STATUS_MAP={
  'calm':{emoji:'😊',label:'All is well today',sub:'Everything looks good'},
  'needs-attention':{emoji:'⚠️',label:'Needs your attention',sub:'Please review the details below'},
  'slight-concern':{emoji:'🔔',label:'Minor things to note',sub:'Some items need attention'},
  'no-data':{emoji:'⏳',label:'No data available yet',sub:'Waiting for sensor updates'}
};

function updateDateDisplay(){
  $('headerDate').textContent=fDate(currentDate);
  if(isToday(currentDate)){$('dateLabel').textContent='Today';$('dateSublabel').textContent=fDisp(currentDate);$('timelineTitle').textContent="Today's Timeline";}
  else if(isYest(currentDate)){$('dateLabel').textContent='Yesterday';$('dateSublabel').textContent=fDisp(currentDate);$('timelineTitle').textContent="Yesterday's Timeline";}
  else{$('dateLabel').textContent=fDisp(currentDate);$('dateSublabel').textContent=fShort(currentDate);$('timelineTitle').textContent='Timeline';}
  $('nextDay').disabled=isToday(currentDate);
}

function showSkeleton(){$('skeleton').classList.remove('hidden');$('errorBox').classList.add('hidden');$('dataView').classList.add('hidden');}
function showError(msg,url){
  $('skeleton').classList.add('hidden');
  $('errorBox').classList.remove('hidden');
  $('dataView').classList.add('hidden');
  $('errorMsg').textContent=msg||'Unknown error';
  $('errorUrl').textContent='URL: '+(url||API_BASE);
}
function showData(){$('skeleton').classList.add('hidden');$('errorBox').classList.add('hidden');$('dataView').classList.remove('hidden');}

function renderBadge(el,status){
  if(!el)return;
  var s=(status||'').toUpperCase();
  var cls='badge-ok',label='OK';
  if(['OK','NORMAL'].includes(s)){cls='badge-ok';label=s==='NORMAL'?'Normal':'OK';}
  else if(['PENDING','WARNING'].includes(s)){cls='badge-pending';label=s==='WARNING'?'Warning':'Pending';}
  else if(['ALERT','ATTENTION','LOW','UNUSUAL'].includes(s)){cls='badge-alert';label=s;}
  el.className='badge '+cls;el.textContent=label;
}
function medSlot(label,status){
  var cls='pending',icon='○';
  if(status==='taken'){cls='taken';icon='✓';}
  else if(status==='missed'||status==='skipped'){cls='missed';icon='✗';}
  return '<div class="med-slot"><div class="med-check '+cls+'">'+icon+'</div><span>'+esc(label)+'</span></div>';
}
function statEl(label,value){return '<div class="stat"><span>'+esc(label)+'</span><span class="stat-value">'+esc(String(value==null?'--':value))+'</span></div>';}

// ── Sleep vitals ──────────────────────────────────────────────
function setVital(boxId,valId,badgeId,raw,label,state){
  var box=$(boxId);if(!box)return;
  box.className='vital-box '+(state||'');
  $(valId).textContent=(raw!=null&&raw!=='')?raw:'--';
  var b=$(badgeId);b.className='vital-badge '+(state||'');b.textContent=label||'--';
}
function vRange(v,okMin,okMax,warnMin,warnMax){
  var n=parseFloat(v);if(isNaN(n))return'';
  if(n<warnMin||n>warnMax)return'valert';
  if(n<okMin||n>okMax)return'vwarn';
  return'vok';
}
async function fetchHA(entity){
  try{
    var r=await fetchWithTimeout(HA_BASE+'/api/states/'+entity,
      {headers:{Authorization:'Bearer '+HA_TOKEN,'Content-Type':'application/json'}},5000);
    if(!r.ok)return null;
    return (await r.json()).state;
  }catch(e){return null;}
}
async function updateSleepVitals(){
  if(!isToday(currentDate)||!HA_TOKEN)return;
  var res=await Promise.all([fetchHA(SLEEP_ENT.breathing),fetchHA(SLEEP_ENT.heartRate),fetchHA(SLEEP_ENT.presence),fetchHA(SLEEP_ENT.light)]);
  var br=res[0],hr=res[1],pr=res[2],lx=res[3];
  var brV=parseFloat(br),brS=vRange(br,12,20,8,25);
  setVital('vboxBreathing','vBreathing','vBreathingBadge',isNaN(brV)?null:brV.toFixed(0),brS==='vok'?'Normal':brS==='vwarn'?'Monitor':brS==='valert'?'⚠ Check':'--',brS);
  var hrV=parseFloat(hr),hrS=vRange(hr,50,100,45,110);
  setVital('vboxHeart','vHeart','vHeartBadge',isNaN(hrV)?null:hrV.toFixed(0),hrS==='vok'?'Normal':hrS==='vwarn'?'Monitor':hrS==='valert'?'⚠ Check':'--',hrS);
  var inBed=(pr==='on');
  setVital('vboxPresence','vPresence','vPresenceBadge',inBed?'Yes':'No',inBed?'In bed':'Away',inBed?'vok':'');
  $('sleepLive').classList.toggle('hidden',!inBed);
  var lxV=parseFloat(lx),lxS=(!isNaN(lxV)&&lxV>50)?'valert':(!isNaN(lxV)&&lxV>10)?'vwarn':'vok';
  setVital('vboxLight','vLight','vLightBadge',isNaN(lxV)?null:lxV.toFixed(0),(!isNaN(lxV)&&lxV>50)?'Light on':(!isNaN(lxV)&&lxV>10)?'Dim':'Dark',lxS);
}

function computeTrend(stats,baseline){
  var total=Number((stats||{}).totalmotion||0),avg=Number((baseline||{}).avgmotionevents||0);
  if(!avg)return{label:'No baseline yet',sub:'Waiting for 7-day average'};
  var r=total/avg;
  if(r<0.5)return{label:'Below usual',sub:total+' today vs '+avg+' baseline'};
  if(r>1.5)return{label:'Above usual',sub:total+' today vs '+avg+' baseline'};
  return{label:'Near baseline',sub:total+' today vs '+avg+' baseline'};
}

function renderTimeline(events,alerts){
  var list=$('timelineList'),toggle=$('timelineToggle');
  var all=[];
  safeArr(events).forEach(function(e){all.push({time:e.time,event:e.event||e.description||'',type:e.type||'motion',isAlert:false});});
  safeArr(alerts).forEach(function(a){all.push({time:a.time,event:a.message||a.event||'',type:'alert',isAlert:true});});
  all.sort(function(a,b){return new Date(b.time||0)-new Date(a.time||0);});
  if(!all.length){list.innerHTML='<li class="timeline-empty">'+(isToday(currentDate)?'No events recorded yet today.':'No events for this day.')+'</li>';toggle.classList.add('hidden');return;}
  var items=timelineExpanded?all:all.slice(0,5);
  var dot=function(item){if(item.isAlert)return'alert';var t=item.type||'';if(t==='bed')return'bed';if(t==='medication')return'medication';if(t.startsWith('door'))return'door';return'motion';};
  list.innerHTML=items.map(function(i){return'<li class="timeline-item'+(i.isAlert?' alert-item':'')+'"><div class="timeline-dot '+dot(i)+'"></div><div class="timeline-time">'+fTime(i.time)+'</div><div class="timeline-event">'+esc(i.event)+'</div></li>';}).join('');
  if(all.length>5){toggle.classList.remove('hidden');toggle.textContent=timelineExpanded?'Show less':'Show all ('+all.length+')';}
  else toggle.classList.add('hidden');
}

function renderData(data){
  currentData=data;
  $('debugPanel').textContent='=== RAW API RESPONSE ===
'+JSON.stringify(data,null,2);

  // normalise score key
  var score=(data.dayscore||data.day_score||'no-data').toString()
    .replace('needsattention','needs-attention')
    .replace('slightconcern','slight-concern')
    .replace('nodata','no-data');
  var info=STATUS_MAP[score]||STATUS_MAP['no-data'];
  $('statusBanner').className='status-banner '+score;
  $('statusBanner').innerHTML='<span class="status-emoji">'+info.emoji+'</span><div><div class="status-label">'+esc(info.label)+'</div><div class="status-sublabel">'+esc(info.sub)+'</div></div>';

  var st=safe(data.status);
  var summary=safe(data.summarytext||data.summary);
  var stats=safe(data.stats);
  var alerts=safeArr(data.alerts);
  var baseline=safe(data.baseline);
  var sleep=safe(data.sleep);
  var timeline=safeArr(data.timeline);

  // Medications
  renderBadge($('medsBadge'),st.meds);
  $('medsSummary').textContent=(typeof summary==='string'?summary:(summary.meds||''))||'No medication data available.';
  $('medsIndicators').innerHTML=medSlot('Morning',stats.medsmorning||'pending')+medSlot('Evening',stats.medsevening||'pending');
  $('medsCard').className='card'+((st.meds||'').toUpperCase()==='ALERT'?' has-alert':'');

  // Activity
  renderBadge($('activityBadge'),st.activity);
  $('activitySummary').textContent=(summary.activity||'No activity data available.');
  $('activityStats').innerHTML=[
    statEl('First motion',fTime(stats.firstmotion)||'--'),
    statEl('Motions',stats.totalmotion!=null?stats.totalmotion:0),
    statEl('Night',stats.nightmotion!=null?stats.nightmotion:0)
  ].join('');
  $('activityCard').className='card'+(['LOW','UNUSUAL','ALERT'].includes((st.activity||'').toUpperCase())?' has-alert':'');

  // Sleep
  $('sleepSummary').textContent=summary.sleep||(sleep.inbed===true?'Currently in bed.':sleep.totalinbedhours?'Time in bed: '+fHours(sleep.totalinbedhours)+'.':(sleep.eventscount>0?'Bed events today: '+sleep.eventscount+'.':'No sleep data recorded yet.'));
  $('sleepStats').innerHTML=[
    statEl('In bed now',sleep.inbed===true?'Yes':sleep.inbed===false?'No':'?'),
    statEl('Time in bed',sleep.totalinbedhours?fHours(sleep.totalinbedhours):'?'),
    statEl('Bed events',sleep.eventscount!=null?sleep.eventscount:0)
  ].join('');
  $('sleepCard').className='card';

  // Safety
  renderBadge($('safetyBadge'),st.safety);
  $('safetySummary').textContent=summary.safety||'No safety data available.';
  $('safetyStats').innerHTML=[
    statEl('Door events',stats.dooreventscount!=null?stats.dooreventscount:0),
    statEl('Alerts',alerts.length),
    statEl('Baseline doors',baseline.avgdoorevents!=null?baseline.avgdoorevents:'--')
  ].join('');
  $('safetyCard').className='card'+(['ATTENTION','ALERT','WARNING'].includes((st.safety||'').toUpperCase())||alerts.length>0?' has-alert':'');

  // Trend / Baseline
  var trend=computeTrend(stats,baseline);
  $('trendValue').textContent=trend.label;$('trendSub').textContent=trend.sub;
  $('baselineValue').textContent=baseline.dayssampled?baseline.dayssampled+' days':'No baseline';
  $('baselineSub').textContent='Motion: '+(baseline.avgmotionevents||'--')+' · Night: '+(baseline.avgnightmotion||'--')+' · Doors: '+(baseline.avgdoorevents||'--');

  renderTimeline(timeline,alerts);
  showData();
  updateSleepVitals();
}

async function fetchData(showLoading){
  if(showLoading!==false) showSkeleton();
  var url=API_BASE+'?date='+encodeURIComponent(fDate(currentDate));
  try{
    var resp=await fetchWithTimeout(url,{},FETCH_TIMEOUT_MS);
    if(!resp.ok) throw new Error('Server returned HTTP '+resp.status);
    var text=await resp.text();
    var data;
    try{ data=JSON.parse(text); }
    catch(e){ throw new Error('Invalid JSON from server: '+text.substring(0,120)); }
    if(Array.isArray(data)) data=data[0];
    if(!data||typeof data!=='object') throw new Error('Empty or unexpected response');
    renderData(data);
  }catch(err){
    console.error(err);
    showError(err.name==='AbortError'?'Request timed out after 10 seconds. Is N8N workflow active?':err.message, url);
  }
}

$('prevDay').addEventListener('click',function(){currentDate.setDate(currentDate.getDate()-1);timelineExpanded=false;updateDateDisplay();fetchData(true);});
$('nextDay').addEventListener('click',function(){if(!isToday(currentDate)){currentDate.setDate(currentDate.getDate()+1);timelineExpanded=false;updateDateDisplay();fetchData(true);}});
$('refreshBtn').addEventListener('click',function(){fetchData(false);});
$('retryBtn').addEventListener('click',function(){fetchData(true);});
$('timelineToggle').addEventListener('click',function(){timelineExpanded=!timelineExpanded;if(currentData)renderTimeline(currentData.timeline||[],currentData.alerts||[]);});
document.addEventListener('keydown',function(e){if(e.key==='d'||e.key==='D'){var p=$('debugPanel');p.style.display=(p.style.display==='block'?'none':'block');}});

function startAutoRefresh(){
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(function(){if(isToday(currentDate))fetchData(false);},60000);
  if(sleepTimer)clearInterval(sleepTimer);
  sleepTimer=setInterval(function(){if(isToday(currentDate))updateSleepVitals();},30000);
}

updateDateDisplay();
fetchData(true);
startAutoRefresh();
})();
</script>
