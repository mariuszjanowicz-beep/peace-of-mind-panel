<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peace of Mind Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F3EE;
      --card: #FFFFFF;
      --text-primary: #2C2C2C;
      --text-secondary: #6B6B6B;
      --text-muted: #9A9A9A;

      --calm: #7BAE7F;
      --calm-bg: #EDF5EE;
      --calm-text: #3D6B40;

      --concern: #D4A052;
      --concern-bg: #FDF3E4;
      --concern-text: #8B6520;

      --attention: #D46A6A;
      --attention-bg: #FAEAEA;
      --attention-text: #8B3030;

      --nodata: #A8A8A8;
      --nodata-bg: #F0F0F0;
      --nodata-text: #6B6B6B;

      --border: #E8E5DF;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
      --shadow-hover: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.05);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;

      --dot-motion: #7BAE7F;
      --dot-medication: #5B9BD5;
      --dot-alert: #D46A6A;
      --dot-door: #A8A8A8;
    }

    html {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      padding-bottom: 32px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-in {
      animation: fadeInUp 0.3s ease-out forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.05s; opacity: 0; }
    .fade-in-delay-2 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-delay-3 { animation-delay: 0.15s; opacity: 0; }
    .fade-in-delay-4 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-delay-5 { animation-delay: 0.25s; opacity: 0; }

    /* ===== SKELETON ===== */
    .skeleton {
      background: linear-gradient(90deg, #E8E5DF 25%, #F0EDE8 50%, #E8E5DF 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }

    .skeleton-banner {
      height: 72px;
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
    }

    .skeleton-card {
      height: 140px;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .header-date {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .refresh-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-btn:active {
      background: var(--border);
      color: var(--text-primary);
    }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== DATE NAV ===== */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px 0 16px;
    }

    .date-nav-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .date-nav-btn:active {
      background: var(--border);
      transform: scale(0.95);
    }

    .date-nav-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .date-nav-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 140px;
      text-align: center;
    }

    .date-nav-sublabel {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ===== STATUS BANNER ===== */
    .status-banner {
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      transition: background 0.3s;
    }

    .status-banner.calm { background: var(--calm-bg); }
    .status-banner.slight_concern { background: var(--concern-bg); }
    .status-banner.needs_attention { background: var(--attention-bg); }
    .status-banner.no_data { background: var(--nodata-bg); }

    .status-emoji {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }

    .status-text-wrap {
      flex: 1;
    }

    .status-label {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }

    .status-banner.calm .status-label { color: var(--calm-text); }
    .status-banner.slight_concern .status-label { color: var(--concern-text); }
    .status-banner.needs_attention .status-label { color: var(--attention-text); }
    .status-banner.no_data .status-label { color: var(--nodata-text); }

    .status-sublabel {
      font-size: 13px;
      margin-top: 2px;
    }

    .status-banner.calm .status-sublabel { color: var(--calm-text); opacity: 0.7; }
    .status-banner.slight_concern .status-sublabel { color: var(--concern-text); opacity: 0.7; }
    .status-banner.needs_attention .status-sublabel { color: var(--attention-text); opacity: 0.7; }
    .status-banner.no_data .status-sublabel { color: var(--nodata-text); opacity: 0.7; }

    /* ===== CARDS ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
      border-left: 3px solid transparent;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .card.has-alert {
      border-left-color: var(--attention);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon.meds { background: #EDE7F6; color: #7E57C2; }
    .card-icon.activity { background: #E8F5E9; color: #66BB6A; }
    .card-icon.safety { background: #E3F2FD; color: #42A5F5; }

    .card-icon svg {
      width: 18px;
      height: 18px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ===== BADGES ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .badge-ok { background: var(--calm-bg); color: var(--calm-text); }
    .badge-normal { background: var(--calm-bg); color: var(--calm-text); }
    .badge-pending { background: var(--concern-bg); color: var(--concern-text); }
    .badge-alert { background: var(--attention-bg); color: var(--attention-text); }

    /* ===== CARD BODY ===== */
    .card-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .card-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      background: #F8F7F4;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
    }

    .stat-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .stat-value {
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Meds indicators */
    .meds-indicators {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .med-slot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .med-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .med-check.taken {
      background: var(--calm);
      color: white;
    }

    .med-check.pending {
      background: var(--concern-bg);
      border: 2px solid var(--concern);
      color: var(--concern);
    }

    .med-check.missed {
      background: var(--attention-bg);
      border: 2px solid var(--attention);
      color: var(--attention);
    }

    .med-check svg {
      width: 12px;
      height: 12px;
    }

    /* ===== TIMELINE ===== */
    .timeline-section {
      margin-top: 8px;
    }

    .timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .timeline-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .timeline-toggle {
      font-size: 13px;
      font-weight: 500;
      color: var(--calm-text);
      background: var(--calm-bg);
      border: none;
      padding: 6px 14px;
      border-radius: 100px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .timeline-toggle:active {
      opacity: 0.7;
    }

    .timeline-list {
      list-style: none;
    }

    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      position: relative;
    }

    .timeline-item:not(:last-child) {
      border-bottom: 1px solid #F0EDE8;
    }

    .timeline-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 4px;
      flex-shrink: 0;
    }

    .timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .timeline-dot.motion { background: var(--dot-motion); }
    .timeline-dot.medication { background: var(--dot-medication); }
    .timeline-dot.alert { background: var(--dot-alert); }
    .timeline-dot.door { background: var(--dot-door); }

    .timeline-time {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      min-width: 44px;
      padding-top: 1px;
    }

    .timeline-event {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
      flex: 1;
    }

    .timeline-empty {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== ALERTS IN TIMELINE ===== */
    .timeline-item.alert-item {
      background: var(--attention-bg);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 4px;
      border-bottom: none;
    }

    .timeline-item.alert-item .timeline-event {
      color: var(--attention-text);
      font-weight: 500;
    }

    /* ===== ERROR STATE ===== */
    .error-state {
      text-align: center;
      padding: 48px 24px;
    }

    .error-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      color: var(--text-muted);
    }

    .error-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .error-message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      max-width: 280px;
      margin-left: auto;
      margin-right: auto;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      background: var(--calm);
      color: white;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      border-radius: var(--radius-sm);
      cursor: pointer;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .error-btn:active { opacity: 0.8; }

    /* ===== UTILITY ===== */
    .hidden { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <svg class="header-logo" viewBox="0 0 28 28" fill="none" aria-label="Peace of Mind logo">
          <circle cx="14" cy="14" r="13" stroke="#7BAE7F" stroke-width="1.5" fill="#EDF5EE"/>
          <path d="M14 7C11 7 8.5 9.2 8.5 12.5c0 4.5 5.5 9 5.5 9s5.5-4.5 5.5-9C19.5 9.2 17 7 14 7z" fill="#7BAE7F" opacity="0.7"/>
          <path d="M14 7C11 7 8.5 9.2 8.5 12.5c0 4.5 5.5 9 5.5 9s5.5-4.5 5.5-9C19.5 9.2 17 7 14 7z" stroke="#7BAE7F" stroke-width="1.2" fill="none"/>
        </svg>
        <div>
          <div class="header-title">Peace of Mind</div>
          <div class="header-date" id="headerDate"></div>
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn" aria-label="Refresh data">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
    </header>

    <!-- DATE NAV -->
    <nav class="date-nav">
      <button class="date-nav-btn" id="prevDay" aria-label="Previous day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div>
        <div class="date-nav-label" id="dateLabel"></div>
        <div class="date-nav-sublabel" id="dateSublabel" style="text-align:center"></div>
      </div>
      <button class="date-nav-btn" id="nextDay" aria-label="Next day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="mainContent">
      <!-- Skeleton loader -->
      <div id="skeleton">
        <div class="skeleton skeleton-banner"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>

      <!-- Error state -->
      <div id="errorState" class="hidden">
        <div class="error-state">
          <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v4"></path>
            <path d="M12 16h.01"></path>
          </svg>
          <div class="error-title">Could not load data</div>
          <div class="error-message">We couldn't reach the server right now. Please check your connection and try again.</div>
          <button class="error-btn" id="retryBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Try again
          </button>
        </div>
      </div>

      <!-- Data view -->
      <div id="dataView" class="hidden">
        <!-- STATUS BANNER -->
        <div id="statusBanner" class="status-banner fade-in"></div>

        <!-- MEDICATIONS CARD -->
        <div id="medsCard" class="card fade-in fade-in-delay-1">
          <div class="card-header">
            <div class="card-header-left">
              <div class="card-icon meds">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v1.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 5.25v-1.5A2.25 2.25 0 0 0 15.75 1.5H13.5"/>
                  <rect x="6" y="7.5" width="12" height="14" rx="2"/>
                  <line x1="12" y1="11.5" x2="12" y2="17.5"/>
                  <line x1="9" y1="14.5" x2="15" y2="14.5"/>
                </svg>
              </div>
              <div class="card-title">Medications</div>
            </div>
            <span id="medsBadge" class="badge"></span>
          </div>
          <div id="medsIndicators" class="meds-indicators"></div>
          <div id="medsSummary" class="card-summary"></div>
        </div>

        <!-- ACTIVITY CARD -->
        <div id="activityCard" class="card fade-in fade-in-delay-2">
          <div class="card-header">
            <div class="card-header-left">
              <div class="card-icon activity">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="4" r="2"/>
                  <path d="M15 22V16l3-3-3-3-1.5-2h-3L9 10l-3 3 3 3v6"/>
                  <path d="M9 16l-3 0"/>
                  <path d="M15 16l3 0"/>
                </svg>
              </div>
              <div class="card-title">Activity</div>
            </div>
            <span id="activityBadge" class="badge"></span>
          </div>
          <div id="activitySummary" class="card-summary"></div>
          <div id="activityStats" class="card-stats"></div>
        </div>

        <!-- SAFETY CARD -->
        <div id="safetyCard" class="card fade-in fade-in-delay-3">
          <div class="card-header">
            <div class="card-header-left">
              <div class="card-icon safety">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2l8 4v6c0 5.25-3.5 9.5-8 11-4.5-1.5-8-5.75-8-11V6l8-4z"/>
                  <polyline points="9 12 11 14 15 10"/>
                </svg>
              </div>
              <div class="card-title">Safety</div>
            </div>
            <span id="safetyBadge" class="badge"></span>
          </div>
          <div id="safetySummary" class="card-summary"></div>
          <div id="safetyStats" class="card-stats"></div>
        </div>

        <!-- TIMELINE -->
        <div class="timeline-section fade-in fade-in-delay-4">
          <div class="timeline-header">
            <div class="timeline-title" id="timelineTitle">Today's Timeline</div>
            <button class="timeline-toggle" id="timelineToggle">Show all</button>
          </div>
          <ul class="timeline-list" id="timelineList"></ul>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ===== TELEGRAM WEBAPP INIT =====
    (function() {
      try {
        if (window.Telegram && Telegram.WebApp) {
          Telegram.WebApp.ready();
          Telegram.WebApp.expand();
          // Adapt header bar color to Telegram theme if available
          if (Telegram.WebApp.themeParams && Telegram.WebApp.themeParams.bg_color) {
            Telegram.WebApp.setHeaderColor(Telegram.WebApp.themeParams.bg_color);
          }
        }
      } catch(e) { /* not in Telegram */ }
    })();

    // ===== STATE =====
    const API_BASE = 'https://n8n.srv1161536.hstgr.cloud/webhook/daily-summary';
    let currentDate = new Date();
    let timelineExpanded = false;
    let currentData = null;
    let refreshTimer = null;

    // ===== HELPERS =====
    function formatDateISO(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function formatDateDisplay(d) {
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    function formatDateShort(d) {
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      return days[d.getDay()];
    }

    function isToday(d) {
      const now = new Date();
      return d.getFullYear() === now.getFullYear() &&
             d.getMonth() === now.getMonth() &&
             d.getDate() === now.getDate();
    }

    function isYesterday(d) {
      const y = new Date();
      y.setDate(y.getDate() - 1);
      return d.getFullYear() === y.getFullYear() &&
             d.getMonth() === y.getMonth() &&
             d.getDate() === y.getDate();
    }

    function formatTime(isoStr) {
      try {
        const d = new Date(isoStr);
        const h = d.getHours();
        const m = String(d.getMinutes()).padStart(2, '0');
        return `${h}:${m}`;
      } catch(e) {
        return '--:--';
      }
    }

    // ===== UI REFS =====
    const $ = (id) => document.getElementById(id);

    // ===== UPDATE DATE DISPLAY =====
    function updateDateDisplay() {
      const iso = formatDateISO(currentDate);
      $('headerDate').textContent = iso;

      if (isToday(currentDate)) {
        $('dateLabel').textContent = 'Today';
        $('dateSublabel').textContent = formatDateDisplay(currentDate);
        $('timelineTitle').textContent = "Today's Timeline";
      } else if (isYesterday(currentDate)) {
        $('dateLabel').textContent = 'Yesterday';
        $('dateSublabel').textContent = formatDateDisplay(currentDate);
        $('timelineTitle').textContent = "Yesterday's Timeline";
      } else {
        $('dateLabel').textContent = formatDateDisplay(currentDate);
        $('dateSublabel').textContent = formatDateShort(currentDate);
        $('timelineTitle').textContent = 'Timeline';
      }

      // Disable next if today
      $('nextDay').disabled = isToday(currentDate);
    }

    // ===== STATUS MAP =====
    const STATUS_MAP = {
      calm: { emoji: '🟢', label: 'All is well today', sub: 'Everything looks good' },
      slight_concern: { emoji: '🟡', label: 'Minor things to note', sub: 'Some items need attention' },
      needs_attention: { emoji: '🔴', label: 'Needs your attention', sub: 'Please review the details below' },
      no_data: { emoji: '⚪', label: 'No data available yet', sub: 'Waiting for sensor updates' }
    };

    // ===== RENDER =====
    function renderData(data) {
      currentData = data;
      const score = data.day_score || 'no_data';
      const info = STATUS_MAP[score] || STATUS_MAP.no_data;

      // Status banner
      const banner = $('statusBanner');
      banner.className = `status-banner fade-in ${score}`;
      banner.innerHTML = `
        <span class="status-emoji">${info.emoji}</span>
        <div class="status-text-wrap">
          <div class="status-label">${info.label}</div>
          <div class="status-sublabel">${info.sub}</div>
        </div>
      `;

      // Status helpers
      const st = data.status || {};
      const summary = data.summary_text || {};
      const stats = data.stats || {};
      const alerts = data.alerts || [];

      // Does a section have alerts?
      const hasAlertForSection = (section) => {
        // Check based on alert types or overall
        if (section === 'safety' && alerts.length > 0) return true;
        return false;
      };

      // MEDS CARD
      const medsCard = $('medsCard');
      medsCard.className = `card fade-in fade-in-delay-1${st.meds === 'ALERT' ? ' has-alert' : ''}`;
      renderBadge($('medsBadge'), st.meds || 'OK');
      $('medsSummary').textContent = summary.meds || 'No medication data available.';

      // Meds indicators
      const medsInd = $('medsIndicators');
      const morningStatus = stats.meds_morning || 'pending';
      const eveningStatus = stats.meds_evening || 'pending';
      medsInd.innerHTML = `
        ${renderMedSlot('Morning', morningStatus)}
        ${renderMedSlot('Evening', eveningStatus)}
      `;

      // ACTIVITY CARD
      const actCard = $('activityCard');
      actCard.className = `card fade-in fade-in-delay-2${st.activity === 'ALERT' ? ' has-alert' : ''}`;
      renderBadge($('activityBadge'), st.activity || 'NORMAL');
      $('activitySummary').textContent = summary.activity || 'No activity data available.';

      const actStats = $('activityStats');
      actStats.innerHTML = `
        ${stats.first_motion_label ? renderStat('sunrise', 'First motion', stats.first_motion_label) : ''}
        ${stats.total_motion != null ? renderStat('activity', 'Motions', stats.total_motion) : ''}
        ${stats.night_motion != null ? renderStat('moon', 'Night', stats.night_motion) : ''}
      `;

      // SAFETY CARD
      const safeCard = $('safetyCard');
      safeCard.className = `card fade-in fade-in-delay-3${(st.safety === 'ALERT' || alerts.length > 0) ? ' has-alert' : ''}`;
      renderBadge($('safetyBadge'), st.safety || 'OK');
      $('safetySummary').textContent = summary.safety || 'No safety data available.';

      const safeStats = $('safetyStats');
      safeStats.innerHTML = `
        ${stats.door_events_count != null ? renderStat('door', 'Door events', stats.door_events_count) : ''}
        ${stats.doors_open_now != null ? renderStat('door-open', 'Open now', stats.doors_open_now) : ''}
        ${alerts.length > 0 ? renderStat('alert', 'Alerts', alerts.length) : ''}
      `;

      // TIMELINE
      renderTimeline(data.timeline || [], alerts);

      // Show data view
      $('skeleton').classList.add('hidden');
      $('errorState').classList.add('hidden');
      $('dataView').classList.remove('hidden');
    }

    function renderBadge(el, status) {
      const s = (status || '').toUpperCase();
      let cls = 'badge-ok';
      let label = s;
      if (s === 'OK' || s === 'NORMAL') { cls = 'badge-ok'; label = s === 'NORMAL' ? 'Normal' : 'OK'; }
      else if (s === 'PENDING') { cls = 'badge-pending'; label = 'Pending'; }
      else if (s === 'ALERT') { cls = 'badge-alert'; label = 'Alert'; }
      else { cls = 'badge-ok'; label = s || 'OK'; }
      el.className = `badge ${cls}`;
      el.textContent = label;
    }

    function renderMedSlot(label, status) {
      let cls = 'pending';
      let iconSvg = '';
      if (status === 'taken') {
        cls = 'taken';
        iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      } else if (status === 'missed' || status === 'skipped') {
        cls = 'missed';
        iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      } else {
        cls = 'pending';
        iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/></svg>';
      }
      return `<div class="med-slot"><div class="med-check ${cls}">${iconSvg}</div><span>${label}</span></div>`;
    }

    function renderStat(icon, label, value) {
      return `<div class="stat">${getStatIcon(icon)}<span>${label}:</span> <span class="stat-value">${value}</span></div>`;
    }

    function getStatIcon(type) {
      const icons = {
        sunrise: '<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M20 12h-4"/><path d="M19.07 4.93l-2.83 2.83"/><path d="M4 12H0"/><path d="M12 20a8 8 0 0 1 0-16"/></svg>',
        activity: '<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
        moon: '<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
        door: '<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="14" height="20" rx="2"/><line x1="9" y1="12" x2="9" y2="12.01"/></svg>',
        'door-open': '<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="14" height="20" rx="2"/><circle cx="9" cy="12" r="1" fill="currentColor"/></svg>',
        alert: '<svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      };
      return icons[type] || '';
    }

    // ===== TIMELINE =====
    function renderTimeline(events, alerts) {
      const list = $('timelineList');
      const toggle = $('timelineToggle');

      // Combine events and alerts
      let allItems = [];

      if (events && events.length) {
        events.forEach(e => allItems.push({
          time: e.time,
          event: e.event,
          type: e.type || 'motion',
          isAlert: false
        }));
      }

      if (alerts && alerts.length) {
        alerts.forEach(a => allItems.push({
          time: a.time,
          event: a.message,
          type: 'alert',
          isAlert: true
        }));
      }

      // Sort by time
      allItems.sort((a, b) => {
        const ta = a.time ? new Date(a.time).getTime() : 0;
        const tb = b.time ? new Date(b.time).getTime() : 0;
        return ta - tb;
      });

      if (allItems.length === 0) {
        const emptyMsg = isToday(currentDate) ? 'No events recorded yet today.' : 'No events recorded for this day.';
        list.innerHTML = `<li class="timeline-empty">${emptyMsg}</li>`;
        toggle.classList.add('hidden');
        return;
      }

      // Determine which items to show
      const showCount = timelineExpanded ? allItems.length : Math.min(3, allItems.length);
      const itemsToShow = timelineExpanded ? allItems : allItems.slice(-3);

      list.innerHTML = itemsToShow.map(item => {
        const dotClass = item.isAlert ? 'alert' : (item.type || 'motion');
        const alertClass = item.isAlert ? ' alert-item' : '';
        const time = item.time ? formatTime(item.time) : '--:--';
        return `<li class="timeline-item${alertClass}">
          <div class="timeline-dot-col"><div class="timeline-dot ${dotClass}"></div></div>
          <div class="timeline-time">${time}</div>
          <div class="timeline-event">${escapeHtml(item.event)}</div>
        </li>`;
      }).join('');

      // Toggle button
      if (allItems.length > 3) {
        toggle.classList.remove('hidden');
        toggle.textContent = timelineExpanded ? 'Show less' : `Show all (${allItems.length})`;
      } else {
        toggle.classList.add('hidden');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // ===== FETCH DATA =====
    async function fetchData(showLoading) {
      if (showLoading) {
        $('skeleton').classList.remove('hidden');
        $('errorState').classList.add('hidden');
        $('dataView').classList.add('hidden');
      }

      const dateStr = formatDateISO(currentDate);
      const url = API_BASE;

      try {
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: dateStr, patient_id: 'default' })
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        renderData(data);
      } catch (err) {
        console.error('Fetch error:', err);
        if (showLoading) {
          $('skeleton').classList.add('hidden');
          $('errorState').classList.remove('hidden');
          $('dataView').classList.add('hidden');
        }
        // If silent refresh fails, keep showing existing data
      }
    }

    // ===== EVENT HANDLERS =====
    $('prevDay').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      timelineExpanded = false;
      updateDateDisplay();
      fetchData(true);
    });

    $('nextDay').addEventListener('click', () => {
      if (!isToday(currentDate)) {
        currentDate.setDate(currentDate.getDate() + 1);
        timelineExpanded = false;
        updateDateDisplay();
        fetchData(true);
      }
    });

    $('refreshBtn').addEventListener('click', () => {
      const btn = $('refreshBtn');
      btn.classList.add('spinning');
      fetchData(false).finally(() => {
        setTimeout(() => btn.classList.remove('spinning'), 500);
      });
    });

    $('retryBtn').addEventListener('click', () => {
      fetchData(true);
    });

    $('timelineToggle').addEventListener('click', () => {
      timelineExpanded = !timelineExpanded;
      if (currentData) {
        renderTimeline(currentData.timeline || [], currentData.alerts || []);
      }
    });

    // ===== AUTO REFRESH =====
    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        // Only auto-refresh if viewing today
        if (isToday(currentDate)) {
          fetchData(false);
        }
      }, 5 * 60 * 1000); // 5 minutes
    }

    // ===== INIT =====
    updateDateDisplay();
    fetchData(true);
    startAutoRefresh();
  </script>
</body>
</html>
